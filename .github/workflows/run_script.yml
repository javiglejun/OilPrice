name: Run Oil Price Script

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar librerías
        run: |
          pip install pandas requests openpyxl

      - name: Ejecutar script 1
        env:
          OILPRICE_API_KEY: ${{ secrets.OILPRICE_API_KEY }}
        run: |
          python NBP_Historico.py

      - name: Subir Excel al repo 1
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Historico_NBP_Price.xlsx
          git commit -m "Actualización automática" || echo "No changes"
          git push
          
      - name: Ejecutar script 2
        env:
          OILPRICE_API_KEY: ${{ secrets.OILPRICE_API_KEY }}
        run: |
          python JKM_Historico.py

      - name: Subir Excel al repo 2
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Historico_JKM_Price.xlsx
          git commit -m "Actualización automática" || echo "No changes"
          git push
